# upstream service pointing to django api container
upstream api {
    server api:8000;  # route traffic to Django service on port 8000
}

server {

    listen 80;  # nginx listens for HTTP traffic

    # root location containing compiled React build files
    root /usr/share/nginx/html;
    index index.html;


    # forward API requests to Django container
    location /api/ {
        proxy_pass http://api;  # proxy /api requests to backend service
    }


    # fallback routing for React single page application
    location / {
        try_files $uri /index.html;  # return index.html when file does not exist
    }

}